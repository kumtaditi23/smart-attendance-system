{% extends "base.html" %}
{% block title %}Login — FaceAttend{% endblock %}
{% block content %}
<style>
.login-wrap{min-height:90vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo h1{font-size:28px;font-weight:700;color:#1a1a2e}
.login-logo h1 span{color:#4ecca3}
.login-logo p{color:#888;font-size:14px;margin-top:4px}
.login-box .btn-primary{width:100%;padding:11px;font-size:15px;margin-top:.5rem}
.hint{text-align:center;font-size:12px;color:#aaa;margin-top:1rem}
</style>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <h1><span>Face</span>Attend</h1>
      <p>Smart Attendance System</p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <div class="hint">Default: admin / admin123</div>
  </div>
</div>
{% endblock %}
