<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Smart Attendance{% endblock %}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
nav{background:#1a1a2e;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
nav .brand{color:#fff;font-size:18px;font-weight:600;letter-spacing:.5px}
nav .brand span{color:#4ecca3}
nav ul{list-style:none;display:flex;gap:4px}
nav ul li a{color:#aab2bd;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:14px;transition:all .2s}
nav ul li a:hover,nav ul li a.active{background:#2d2d44;color:#fff}
nav .logout{color:#e74c3c!important}
.container{max-width:1200px;margin:0 auto;padding:2rem}
.page-title{font-size:24px;font-weight:600;margin-bottom:1.5rem;color:#1a1a2e}
.card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:1.5rem}
.card-title{font-size:16px;font-weight:600;margin-bottom:1rem;color:#1a1a2e}
.btn{display:inline-block;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;text-decoration:none;transition:all .2s}
.btn-primary{background:#4ecca3;color:#1a1a2e}
.btn-primary:hover{background:#38b28e}
.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-secondary{background:#f0f2f5;color:#1a1a2e;border:1px solid #ddd}
.btn-secondary:hover{background:#e0e2e5}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border-radius:12px;padding:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.stat-card .num{font-size:32px;font-weight:700;color:#4ecca3}
.stat-card .label{font-size:13px;color:#888;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f8f9fa;padding:10px 14px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #eee}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;color:#333}
tr:hover td{background:#fafbff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:#e8f8f2;color:#27ae60}
.badge-red{background:#fdecea;color:#e74c3c}
.badge-blue{background:#eaf2ff;color:#2980b9}
.alert{padding:12px 16px;border-radius:8px;margin-bottom:1rem;font-size:14px}
.alert-error{background:#fdecea;color:#c0392b;border-left:4px solid #e74c3c}
.alert-success{background:#e8f8f2;color:#1e8449;border-left:4px solid #27ae60}
input,select{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border .2s}
input:focus,select:focus{border-color:#4ecca3}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:#555}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.form-row{grid-template-columns:1fr}nav ul{display:none}}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
{% if session.logged_in %}
<nav>
  <div class="brand"><span>Face</span>Attend</div>
  <ul>
    <li><a href="/dashboard" {% if request.path=='/dashboard' %}class="active"{% endif %}>Dashboard</a></li>
    <li><a href="/attendance" {% if request.path=='/attendance' %}class="active"{% endif %}>Take Attendance</a></li>
    <li><a href="/admin" {% if request.path=='/admin' %}class="active"{% endif %}>Students</a></li>
    <li><a href="/reports" {% if request.path=='/reports' %}class="active"{% endif %}>Reports</a></li>
    <li><a href="/logout" class="logout">Logout</a></li>
  </ul>
</nav>
{% endif %}
<div class="container">
{% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
