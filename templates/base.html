<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}FaceAttend{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
{% block extra_css %}{% endblock %}
</head>
<body>
{% if session.logged_in %}
<nav>
  <a href="/dashboard" class="brand">
    <div class="brand-icon">&#128247;</div>
    <span>Face</span>Attend
  </a>
  <ul>
    <li><a href="/dashboard"   {% if request.path=='/dashboard'   %}class="active"{% endif %}>Dashboard</a></li>
    <li><a href="/attendance"  {% if request.path=='/attendance'  %}class="active"{% endif %}>Attendance</a></li>
    <li><a href="/admin"       {% if request.path=='/admin'       %}class="active"{% endif %}>Students</a></li>
    <li><a href="/reports"     {% if request.path=='/reports'     %}class="active"{% endif %}>Reports</a></li>
    <li><a href="/logout" class="logout">Logout</a></li>
  </ul>
</nav>
{% endif %}
<div class="container">
{% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
